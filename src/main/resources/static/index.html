<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios UPTC</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>🚀 Panel de Control - Infraestructura Distribuida</h1>

<div class="container">
    <div class="form-section">
        <h2>➕ Nuevo Usuario</h2>
        <form id="userForm" onsubmit="createUser(event)">
            <div class="form-group">
                <label for="name">Nombre:</label>
                <input type="text" id="name" required placeholder="Ej. Valeria">
            </div>
            <div class="form-group">
                <label for="lastName">Apellido:</label>
                <input type="text" id="lastName" required placeholder="Ej. Tocarruncho">
            </div>
            <div class="form-group">
                <label for="age">Edad:</label>
                <input type="number" id="age" required min="1" max="120" placeholder="Ej. 29">
            </div>
            <button type="submit" class="btn-submit">Guardar Usuario</button>
        </form>
    </div>

    <div class="table-section">
        <h2>👥 Lista de Usuarios</h2>
        <table>
            <thead>
            <tr>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Edad</th>
                <th>IP (Réplica)</th>
                <th>Servidor</th>
            </tr>
            </thead>
            <tbody id="userTableBody">
            </tbody>
        </table>

        <div class="pagination">
            <button id="btnPrev" class="btn-page" onclick="changePage(-1)">⬅️ Anterior</button>
            <span id="pageInfo">Cargando...</span>
            <button id="btnNext" class="btn-page" onclick="changePage(1)">Siguiente ➡️</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
